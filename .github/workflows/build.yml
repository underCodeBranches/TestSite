name: Build
on:
    push:
        branches: [master]
jobs:
    build:
        runs-on: self-hosted
        steps:
         - name: Set up QEMU
           uses: docker/setup-qemu-action@v4
         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v4
         - name: Build and push
           uses: docker/build-push-action@v7
           with:
            file: Dockerfile
            push: false
            tags: user/app:latest